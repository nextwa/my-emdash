name: Sync upstream EmDash blog-cloudflare

on:
  schedule:
    # daily at 03:20 UTC
    - cron: "20 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream blog-cloudflare template
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 "https://api.github.com/repos/emdash-cms/templates/tarball/main" -o tpl.tar.gz
          mkdir -p _up
          tar -xzf tpl.tar.gz -C _up --strip-components=1
          test -f _up/blog-cloudflare/package.json

      - name: Replace repo with upstream
        run: |
          set -e
          cp .github/workflows/sync-upstream.yml /tmp/sync-upstream.yml
          cp .gitignore /tmp/gitignore.bak 2>/dev/null || true
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name '_up' \
            ! -name 'tpl.tar.gz' \
            -exec rm -rf {} +
          cp -R _up/blog-cloudflare/. .
          rm -rf _up tpl.tar.gz

      - name: Re-apply free-tier patch (remove sandbox / paid features)
        run: |
          set -euo pipefail
          # Drop paid sandbox features and run the plugins in-process. Fail if
          # the upstream structure changes so a broken config is never committed.
          node <<'NODE'
          const fs = require("fs");
          const path = "astro.config.mjs";
          let source = fs.readFileSync(path, "utf8");

          source = source
            .replace(
              /import\s*\{\s*d1,\s*r2,\s*sandbox\s*\}\s*from\s*"@emdash-cms\/cloudflare";/,
              'import { d1, r2 } from "@emdash-cms/cloudflare";',
            )
            .replace(/^[ \t]*sandboxed:\s*\[[\s\S]*?\],?\s*$/m, "")
            .replace(/^[ \t]*sandboxRunner:\s*sandbox\(\),?\s*$/m, "")
            .replace(/^[ \t]*marketplace:\s*.*$/m, "")
            .replace(
              /^(\s*)plugins:\s*\[formsPlugin\(\)\],/m,
              "$1plugins: [formsPlugin(), webhookNotifier],",
            );

          const invalid = ["sandbox }", "sandboxed:", "sandboxRunner:", "marketplace:"];
          if (invalid.some((value) => source.includes(value))) {
            throw new Error("Upstream Astro config no longer matches the free-tier patch");
          }
          if (!source.includes("plugins: [formsPlugin(), webhookNotifier],")) {
            throw new Error("Plugin configuration was not patched");
          }

          fs.writeFileSync(path, source);
          NODE

          # worker.ts: only export default (drop PluginBridge Durable Object)
          printf 'export { default } from "@emdash-cms/cloudflare/worker";\n' > src/worker.ts

          # wrangler.jsonc: strip worker_loaders, set worker name + real binding IDs
          node -e '
            const fs = require("fs");
            let raw = fs.readFileSync("wrangler.jsonc","utf8");
            let clean = raw
              .replace(/\/\/.*$/gm,"")
              .replace(/\/\*[\s\S]*?\*\//g,"")
              .replace(/,\s*([}\]])/g,"$1");
            let cfg = JSON.parse(clean);
            cfg.name = "my-emdash";
            cfg.d1_databases = cfg.d1_databases || [{}];
            cfg.d1_databases[0] = { binding:"DB", database_name:"my-emdash-site", database_id:"17af3af5-b246-4d80-a061-cb04d5ca1c57" };
            cfg.r2_buckets = [{ binding:"MEDIA", bucket_name:"my-emdash-media" }];
            cfg.kv_namespaces = [{ binding:"SESSION", id:"a6b4d3b801974215872df85858b0aa5f" }];
            delete cfg.worker_loaders;
            fs.writeFileSync("wrangler.jsonc", JSON.stringify(cfg,null,"\t")+"\n");
          '

          node --check astro.config.mjs
          node --check src/worker.ts

      - name: Restore workflow + gitignore
        run: |
          mkdir -p .github/workflows
          cp /tmp/sync-upstream.yml .github/workflows/sync-upstream.yml
          printf 'node_modules\n.wrangler\ndist\n.data\n' > .gitignore

      - name: Commit and push if changed
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No upstream changes."
          else
            git commit -m "chore: sync upstream emdash-cms/templates/blog-cloudflare + free-tier patch"
            git push
          fi
