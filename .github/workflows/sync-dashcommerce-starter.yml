name: Sync DashCommerce starter

"on":
  workflow_dispatch: {}
  schedule:
    - cron: "20 19 * * *"

permissions:
  contents: write

concurrency:
  group: sync-dashcommerce-starter
  cancel-in-progress: false

jobs:
  sync:
    name: Sync starter template
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'nextwa/my-emdash' }}

    steps:
      - name: Checkout site repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout upstream starter
        uses: actions/checkout@v4
        with:
          repository: emdashCommerce/starter
          ref: main
          path: upstream-starter

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Enable pnpm
        run: corepack enable

      - name: Sync starter files
        run: |
          set -euo pipefail

          rsync -a --delete upstream-starter/ ./ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "upstream-starter/" \
            --exclude ".node-version" \
            --exclude "wrangler.jsonc" \
            --exclude "pnpm-workspace.yaml" \
            --exclude "patches/" \
            --exclude "scripts/patch-wrangler-config.mjs" \
            --exclude "scripts/cf-d1-seed.mjs"

          rm -rf upstream-starter

      - name: Reapply deployment package settings
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");
          const path = "package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          const deploy = "DEPLOY_TARGET=cloudflare astro build && node scripts/patch-wrangler-config.mjs && wrangler deploy --config dist/server/wrangler.json";

          pkg.dependencies = {
            ...pkg.dependencies,
            "@emdash-cms/cloudflare": "^0.27.0",
            emdash: "^0.27.0",
          };
          pkg.engines = {
            ...pkg.engines,
            node: ">=22.12.0",
          };
          pkg.scripts = {
            ...pkg.scripts,
            deploy,
            "cf:deploy": deploy,
            "cf:dev": "DEPLOY_TARGET=cloudflare astro build && node scripts/patch-wrangler-config.mjs && wrangler dev --config dist/server/wrangler.json",
          };
          pkg.packageManager = "pnpm@11.9.0";
          pkg.patchedDependencies = {
            "@dashcommerce/core@0.1.4": "patches/@dashcommerce__core@0.1.4.patch",
          };

          fs.writeFileSync(path, JSON.stringify(pkg, null, "\t") + "\n");
          NODE

          rm -f bun.lock

      - name: Refresh lockfile
        run: pnpm install --lockfile-only

      - name: Check peer dependencies
        run: pnpm peers check

      - name: Commit synced starter
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No starter updates."
            exit 0
          fi

          git add -A
          git commit -m "chore: sync DashCommerce starter"
          git push origin HEAD:main
