name: Sync EmDash Cloudflare template

"on":
  workflow_dispatch: {}
  schedule:
    - cron: "10 19 * * *"

permissions:
  contents: write

concurrency:
  group: sync-emdash-cloudflare-template
  cancel-in-progress: false

jobs:
  sync:
    name: Sync blog-cloudflare template
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'nextwa/my-emdash' }}

    steps:
      - name: Checkout site repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout upstream templates
        uses: actions/checkout@v4
        with:
          repository: emdash-cms/templates
          ref: main
          path: upstream-templates

      - name: Sync template files
        run: |
          set -euo pipefail

          rsync -a --delete upstream-templates/blog-cloudflare/ ./ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "upstream-templates/" \
            --exclude "wrangler.jsonc" \
            --exclude "seed/"

      - name: Commit synced template
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No template updates."
            exit 0
          fi

          git add -A
          git commit -m "chore: sync EmDash Cloudflare template"
          git push origin HEAD:main
